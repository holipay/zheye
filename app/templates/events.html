{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="page-header">
        <h1>{{ t("events.title") }}</h1>
        <p class="subtitle">{{ t("events.subtitle") }}</p>
    </div>

    <div class="events-container">
        <div id="events-timeline">
            <!-- 通过 HTMX 加载事件时间线 -->
            <div hx-get="/api/events/timeline?days={{ days }}{% if category %}&category={{ category }}{% endif %}&lang={{ lang }}" 
                 hx-trigger="load" 
                 hx-target="#events-timeline">
                <div class="loading">{{ t("events.loading") }}</div>
            </div>
        </div>
    </div>
</div>

<style>
.page-header {
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid #e2e8f0;
}

.page-header h1 {
    margin: 0 0 0.5rem 0;
    font-size: 1.75rem;
    font-weight: 700;
    color: #1e293b;
}

.page-header .subtitle {
    margin: 0;
    color: #64748b;
    font-size: 1rem;
}

.events-container {
    max-width: 1200px;
}

.loading {
    text-align: center;
    padding: 3rem;
    color: #64748b;
}
</style>
{% endblock %}
