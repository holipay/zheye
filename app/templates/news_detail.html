{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <a href="/{{ lang }}/news" class="back-link">&larr; {{ t("nav.news") }}</a>
</div>

<div id="news-detail"
     hx-get="/api/news/{{ news_id }}?lang={{ lang }}"
     hx-trigger="load"
     hx-target="#news-detail"
     hx-swap="innerHTML">
    <div class="loading">{{ t("common.loading") }}</div>
</div>
{% endblock %}
