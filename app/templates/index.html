{% extends "base.html" %}

{% block content %}
<!-- 英雄区域 -->
<div class="hero-section">
    <div class="hero-content">
        <h1 class="hero-title">全球财经资讯 · AI 智能洞察</h1>
        <p class="hero-subtitle">聚合 44+ 权威信源，AI 深度分析，助您把握财经脉搏</p>
        <div class="hero-stats">
            <div class="hero-stat">
                <div class="hero-stat-value" id="stat-total">-</div>
                <div class="hero-stat-label">新闻总量</div>
            </div>
            <div class="hero-stat">
                <div class="hero-stat-value" id="stat-sources">44+</div>
                <div class="hero-stat-label">信息源</div>
            </div>
            <div class="hero-stat">
                <div class="hero-stat-value" id="stat-categories">13</div>
                <div class="hero-stat-label">分类</div>
            </div>
        </div>
    </div>
</div>

<!-- 图表区域 -->
<div style="display: grid; grid-template-columns: 2fr 1fr; gap: var(--spacing-md); margin-bottom: var(--spacing-lg);">
    <!-- 每日趋势 -->
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">每日新闻趋势</h2>
            <span style="font-size: 12px; color: var(--text-muted);">近30天</span>
        </div>
        <div class="card-body" style="height: 250px;">
            <div id="daily-trend-chart" class="loading">加载中...</div>
        </div>
    </div>

    <!-- 情感分布 -->
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">情感分布</h2>
            <span style="font-size: 12px; color: var(--text-muted);">近7天</span>
        </div>
        <div class="card-body" style="height: 250px;">
            <div id="sentiment-chart" class="loading">加载中...</div>
        </div>
    </div>
</div>

<!-- 主内容网格 -->
<div class="home-grid">
    <!-- 左侧：新闻流 -->
    <div>
        <!-- 分类统计 -->
        <div class="card" style="margin-bottom: var(--spacing-md);">
            <div class="card-header">
                <h2 class="card-title">分类热度</h2>
            </div>
            <div class="card-body" style="height: 200px;">
                <div id="category-chart" class="loading">加载中...</div>
            </div>
        </div>

        <!-- 头条新闻 -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">今日头条</h2>
                <a href="/news" class="card-link">查看更多 →</a>
            </div>
            <div id="featured-news" 
                 hx-get="/api/latest?limit=5" 
                 hx-trigger="load"
                 hx-target="#featured-news"
                 hx-swap="innerHTML">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 最新新闻 -->
        <div class="card" style="margin-top: var(--spacing-md);">
            <div class="card-header">
                <h2 class="card-title">最新资讯</h2>
                <div class="sort-toggle">
                    <a href="/" class="sort-btn active" 
                       hx-get="/api/latest?limit=10" hx-target="#news-feed" hx-swap="innerHTML">最新</a>
                    <a href="/" class="sort-btn"
                       hx-get="/api/news?sort=weight&limit=10" hx-target="#news-feed" hx-swap="innerHTML">重要</a>
                </div>
            </div>
            <div class="news-list" id="news-feed"
                 hx-get="/api/latest?limit=10" 
                 hx-trigger="load"
                 hx-target="#news-feed"
                 hx-swap="innerHTML">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 右侧：侧边栏 -->
    <aside class="sidebar">
        <!-- 热门关键词 -->
        <div class="sidebar-widget">
            <div class="widget-header">热门关键词</div>
            <div class="widget-content">
                <div class="keyword-list" id="keywords"
                     hx-get="/api/keywords/popular?limit=15" hx-trigger="load" hx-target="#keywords" hx-swap="innerHTML">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>

        <!-- 热门实体 -->
        <div class="sidebar-widget">
            <div class="widget-header">关注实体</div>
            <div class="widget-content">
                <div class="entity-list" id="entities"
                     hx-get="/api/entities/popular?limit=8" hx-trigger="load" hx-target="#entities" hx-swap="innerHTML">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>

        <!-- 地域分布 -->
        <div class="sidebar-widget">
            <div class="widget-header">地域分布</div>
            <div class="widget-content" style="height: 200px;">
                <div id="region-chart" class="loading">加载中...</div>
            </div>
        </div>
    </aside>
</div>

<script src="/static/js/chart.min.js"></script>
<script src="/static/js/charts.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // 加载统计数据
    fetch('/api/meta')
        .then(r => r.json())
        .then(data => {
            document.getElementById('stat-total').textContent = data.total || 0;
        });

    // 加载图表
    loadCharts();
});

async function loadCharts() {
    // 每日趋势
    ChartUtils.loadAndCreate(
        '/api/charts/daily-trend?days=30',
        (ctx, data) => ChartUtils.createLineChart(ctx, data.labels, [{
            label: '新闻数量',
            data: data.values,
            borderColor: ChartUtils.colors.accent,
            backgroundColor: ChartUtils.colors.accent + '20',
            fill: true,
            tension: 0.3
        }]),
        'daily-trend-chart'
    );

    // 情感分布
    ChartUtils.loadAndCreate(
        '/api/charts/sentiment?days=7',
        (ctx, data) => ChartUtils.createPieChart(ctx, data.labels, data.values, data.colors),
        'sentiment-chart'
    );

    // 分类统计
    ChartUtils.loadAndCreate(
        '/api/charts/categories?days=30',
        (ctx, data) => ChartUtils.createBarChart(ctx, data.labels, data.values),
        'category-chart'
    );

    // 地域分布
    ChartUtils.loadAndCreate(
        '/api/charts/regions?days=30',
        (ctx, data) => ChartUtils.createPieChart(ctx, data.labels, data.values, data.colors),
        'region-chart'
    );
}
</script>
{% endblock %}
