<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - zheye 全球资讯</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo"><a href="/">📰 zheye</a></h1>
            <nav class="nav">
                <a href="/" class="nav-link {% if title == 'AI 分析' %}active{% endif %}">AI 分析</a>
                <a href="/news" class="nav-link {% if title == '新闻' %}active{% endif %}">新闻</a>
                <a href="/articles" class="nav-link {% if title == '文章' %}active{% endif %}">文章</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>zheye - 全球新闻聚合与 AI 分析平台</p>
        </div>
    </footer>
</body>
</html>
