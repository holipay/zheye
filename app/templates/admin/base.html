<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - 者也管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/admin.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/admin" class="sidebar-logo">
                    <span class="logo-icon">者也</span>
                    <span class="logo-text">管理后台</span>
                </a>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin" class="nav-item {% if title == '管理后台' %}active{% endif %}">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">仪表盘</span>
                </a>
                <a href="/admin/sources" class="nav-item {% if title == 'RSS源管理' %}active{% endif %}">
                    <span class="nav-icon">📡</span>
                    <span class="nav-text">RSS源管理</span>
                </a>
                <a href="/admin/monitor" class="nav-item {% if title == '数据监控' %}active{% endif %}">
                    <span class="nav-icon">📈</span>
                    <span class="nav-text">数据监控</span>
                </a>
                <a href="/admin/logs" class="nav-item {% if title == '运行日志' %}active{% endif %}">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">运行日志</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="/" class="nav-item">
                    <span class="nav-icon">🌐</span>
                    <span class="nav-text">返回前台</span>
                </a>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="admin-main">
            <!-- 顶部栏 -->
            <header class="admin-header">
                <div class="header-left">
                    <h1>{{ title }}</h1>
                </div>
                <div class="header-right">
                    <span class="system-time" id="system-time"></span>
                </div>
            </header>

            <!-- 内容区 -->
            <div class="admin-content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('system-time').textContent = now.toLocaleString('zh-CN');
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
