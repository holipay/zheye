<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{{ title }} - {{ t("site.name") }} Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/admin.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/{{ lang }}/admin" class="sidebar-logo">
                    <span class="logo-icon">{{ t("site.name") }}</span>
                    <span class="logo-text">Admin</span>
                </a>
            </div>
            <nav class="sidebar-nav">
                <a href="/{{ lang }}/admin" class="nav-item {% if title == 'Dashboard' %}active{% endif %}">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">Dashboard</span>
                </a>
                <a href="/{{ lang }}/admin/sources" class="nav-item {% if title == 'RSS Sources' %}active{% endif %}">
                    <span class="nav-icon">📡</span>
                    <span class="nav-text">RSS Sources</span>
                </a>
                <a href="/{{ lang }}/admin/monitor" class="nav-item {% if title == 'Data Monitor' %}active{% endif %}">
                    <span class="nav-icon">📈</span>
                    <span class="nav-text">Data Monitor</span>
                </a>
                <a href="/{{ lang }}/admin/logs" class="nav-item {% if title == 'Logs' %}active{% endif %}">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">Logs</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="/{{ lang }}" class="nav-item">
                    <span class="nav-icon">🌐</span>
                    <span class="nav-text">Back to Site</span>
                </a>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="admin-main">
            <!-- 顶部栏 -->
            <header class="admin-header">
                <div class="header-left">
                    <h1>{{ title }}</h1>
                </div>
                <div class="header-right">
                    <span class="system-time" id="system-time"></span>
                </div>
            </header>

            <!-- 内容区 -->
            <div class="admin-content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script>
        // 配置 HTMX 自动添加 CSRF token
        document.addEventListener('htmx:configRequest', function(event) {
            const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
            event.detail.headers['X-CSRF-Token'] = csrfToken;
        });
        
        function updateTime() {
            const now = new Date();
            const locale = '{{ lang }}' === 'zh' ? 'zh-CN' : 'en-US';
            document.getElementById('system-time').textContent = now.toLocaleString(locale);
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
