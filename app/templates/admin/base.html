<!DOCTYPE html>

    <script src="/static/js/htmx.min.js"></script>

            rss_sources: {{ t("admin.rss_sources")|tojson }},
            data_monitor: {{ t("admin.data_monitor")|tojson }},
            logs: {{ t("admin.logs")|tojson }},
            back_to_site: {{ t("admin.back_to_site")|tojson }},
            total_news: {{ t("admin.total_news")|tojson }},
            today: {{ t("admin.today")|tojson }},

            sources: {{ t("admin.sources")|tojson }},
            active_events: {{ t("admin.active_events")|tojson }},

            source_health: {{ t("admin.source_health")|tojson }},
            manage_sources: {{ t("admin.manage_sources")|tojson }},

            fetched_saved: {{ t("admin.fetched_saved")|tojson }},

            healthy: {{ t("admin.healthy")|tojson }},
            search_sources: {{ t("admin.search_sources")|tojson }},
            all_categories: {{ t("admin.all_categories")|tojson }},
            all_status: {{ t("admin.all_status")|tojson }},
            warning: {{ t("admin.warning")|tojson }},
            error: {{ t("admin.error")|tojson }},
            language: {{ t("admin.language")|tojson }},
            weight: {{ t("admin.weight")|tojson }},
            status: {{ t("admin.status")|tojson }},

            last_check: {{ t("admin.last_check")|tojson }},
            last_fetch: {{ t("admin.last_fetch")|tojson }},
            actions: {{ t("admin.actions")|tojson }},
            details: {{ t("admin.details")|tojson }},
            enabled: {{ t("admin.enabled")|tojson }},

            source_details: {{ t("admin.source_details")|tojson }},
            basic_info: {{ t("admin.basic_info")|tojson }},
            url: {{ t("admin.url")|tojson }},
            category: {{ t("admin.category")|tojson }},
            health_status: {{ t("admin.health_status")|tojson }},
            total_checks: {{ t("admin.total_checks")|tojson }},
            consecutive_failures: {{ t("admin.consecutive_failures")|tojson }},
            last_error: {{ t("admin.last_error")|tojson }},
            recent_news: {{ t("admin.recent_news")|tojson }},
            no_news: {{ t("admin.no_news")|tojson }},
            no_data: {{ t("admin.no_data")|tojson }},
            source_news_stats: {{ t("admin.source_news_stats")|tojson }},
            system_info: {{ t("admin.system_info")|tojson }},

            sources_label: {{ t("admin.sources_label")|tojson }},

            today_news: {{ t("admin.today_news")|tojson }},
            refresh: {{ t("admin.refresh")|tojson }},
            source: {{ t("common.source")|tojson }}
        };
    </script>
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/{{ lang }}/admin" class="sidebar-logo">
                    <span class="logo-icon">{{ t("site.name") }}</span>
                    <span class="logo-text">Admin</span>
                </a>
            </div>
            <nav class="sidebar-nav">
                <a href="/{{ lang }}/admin" class="nav-item {% if title == t('admin.dashboard') %}active{% endif %}">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">{{ t("admin.dashboard") }}</span>
                </a>
                <a href="/{{ lang }}/admin/sources" class="nav-item {% if title == t('admin.rss_sources') %}active{% endif %}">
                    <span class="nav-icon">📡</span>
                    <span class="nav-text">{{ t("admin.rss_sources") }}</span>
                </a>
                <a href="/{{ lang }}/admin/monitor" class="nav-item {% if title == t('admin.data_monitor') %}active{% endif %}">
                    <span class="nav-icon">📈</span>
                    <span class="nav-text">{{ t("admin.data_monitor") }}</span>
                </a>
                <a href="/{{ lang }}/admin/logs" class="nav-item {% if title == t('admin.logs') %}active{% endif %}">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">{{ t("admin.logs") }}</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="/{{ lang }}" class="nav-item">
                    <span class="nav-icon">🌐</span>
                    <span class="nav-text">{{ t("admin.back_to_site") }}</span>
                </a>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="admin-main">
            <!-- 顶部栏 -->
            <header class="admin-header">
                <div class="header-left">
                    <h1>{{ title }}</h1>
                </div>
                <div class="header-right">
                    <span class="system-time" id="system-time"></span>
                </div>
            </header>

            <!-- 内容区 -->
            <div class="admin-content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- 暗黑模式切换按钮 -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode" id="theme-toggle">🌙</button>

    <script>
        // 暗黑模式
        function getTheme() {
            return localStorage.getItem('theme') || 'light';
        }
        
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            const btn = document.getElementById('theme-toggle');
            if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
        }
        
        function toggleTheme() {
            const current = getTheme();
            setTheme(current === 'dark' ? 'light' : 'dark');
        }
        
        // 初始化主题
        setTheme(getTheme());

        // 配置 HTMX 自动添加 CSRF token
        document.addEventListener('htmx:configRequest', function(event) {
            const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
            event.detail.headers['X-CSRF-Token'] = csrfToken;
        });
        
        function updateTime() {
            const now = new Date();
            const locale = '{{ lang }}' === 'zh' ? 'zh-CN' : 'en-US';
            document.getElementById('system-time').textContent = now.toLocaleString(locale);
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
