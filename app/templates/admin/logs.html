{% extends "admin/base.html" %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h3 class="card-title">{{ t("admin.logs") }}</h3>
        <button class="btn btn-primary" onclick="loadRunHistory()">{{ t("admin.refresh") }}</button>
    </div>
    <div class="card-body">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>{{ t("admin.run_type") }}</th>
                        <th>{{ t("admin.started") }}</th>
                        <th>{{ t("admin.duration") }}</th>
                        <th>{{ t("admin.sources") }}</th>
                        <th>{{ t("admin.success_rate") }}</th>
                        <th>{{ t("admin.fetched") }}</th>
                        <th>{{ t("admin.saved") }}</th>
                    </tr>
                </thead>
                <tbody id="runs-table">
                    <tr>
                        <td colspan="8" class="loading">{{ t("common.loading") }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    loadRunHistory();
});

async function loadRunHistory() {
    try {
        const response = await fetch('/admin/api/run-history?limit=50');
        const data = await response.json();
        
        const tbody = document.getElementById('runs-table');
        const locale = '{{ lang }}' === 'zh' ? 'zh-CN' : 'en-US';
        
        if (data.runs && data.runs.length > 0) {
            tbody.innerHTML = data.runs.map(run => {
                const duration = run.duration ? formatDuration(run.duration) : '-';
                const startTime = run.started_at ? new Date(run.started_at).toLocaleString(locale) : '-';
                const successRate = run.sources_attempted > 0 
                    ? Math.round(run.sources_succeeded / run.sources_attempted * 100) 
                    : 0;
                
                let statusBadge = `<span class="badge badge-success">${i18n.enabled}</span>`;
                if (successRate < 50) {
                    statusBadge = `<span class="badge badge-danger">${i18n.error}</span>`;
                } else if (successRate < 80) {
                    statusBadge = `<span class="badge badge-warning">${i18n.warning}</span>`;
                }
                
                return `
                    <tr>
                        <td>${run.id}</td>
                        <td><span class="badge badge-info">${run.run_type || '-'}</span></td>
                        <td style="font-size: 13px;">${startTime}</td>
                        <td>${duration}</td>
                        <td>${run.sources_attempted || 0}</td>
                        <td>
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <span style="color: var(--admin-success);">${run.sources_succeeded || 0}</span>
                                <span>/</span>
                                <span style="color: var(--admin-danger);">${run.sources_failed || 0}</span>
                                ${statusBadge}
                            </div>
                        </td>
                        <td>${run.items_fetched || 0}</td>
                        <td>${run.items_final || 0}</td>
                    </tr>
                `;
            }).join('');
        } else {
            tbody.innerHTML = `<tr><td colspan="8" style="text-align: center; color: var(--text-secondary);">${i18n.no_run_history}</td></tr>`;
        }
    } catch (error) {
        console.error('Error loading run history:', error);
    }
}

function formatDuration(seconds) {
    if (seconds < 60) {
        return `${seconds}s`;
    }
    const minutes = Math.floor(seconds / 60);
    const remainingSeconds = seconds % 60;
    return `${minutes}m ${remainingSeconds}s`;
}
</script>
{% endblock %}
