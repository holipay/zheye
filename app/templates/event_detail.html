{% extends "base.html" %}

{% block content %}
<div id="event-detail-content">
    <!-- 通过 HTMX 加载事件详情 -->
    <div hx-get="/api/events/{{ event_id }}?lang={{ lang }}" 
         hx-trigger="load" 
         hx-target="#event-detail-content">
        <div class="loading">{{ t("common.loading") }}</div>
    </div>
</div>

<style>
.loading {
    text-align: center;
    padding: 3rem;
    color: #64748b;
}
</style>
{% endblock %}
