<div class="keyword-list">
    <h4 class="keyword-title">热门关键字</h4>
    <div class="keyword-tags">
        {% for kw in keywords %}
        <a href="/news?keyword_id={{ kw.id }}" 
           class="keyword-tag"
           hx-get="/api/news?keyword_id={{ kw.id }}&sort={{ sort or 'date' }}"
           hx-target="#news-list"
           hx-swap="innerHTML">
            <span class="keyword-term">{{ kw.term }}</span>
            <span class="keyword-count">{{ kw.article_count }}</span>
        </a>
        {% endfor %}
    </div>
</div>
