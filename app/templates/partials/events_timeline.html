<!-- 事件时间线模板 -->
<div class="events-timeline">
    <div class="timeline-header">
        <h3>事件追踪</h3>
        <div class="timeline-filters">
            <select id="event-category-filter" hx-get="/api/events/timeline" hx-target="#events-timeline-content" hx-include="[name='days']">
                <option value="">全部分类</option>
                <option value="央行与利率" {% if category == '央行与利率' %}selected{% endif %}>央行与利率</option>
                <option value="股市与市场" {% if category == '股市与市场' %}selected{% endif %}>股市与市场</option>
                <option value="宏观经济" {% if category == '宏观经济' %}selected{% endif %}>宏观经济</option>
                <option value="国际财经" {% if category == '国际财经' %}selected{% endif %}>国际财经</option>
                <option value="科技与企业" {% if category == '科技与企业' %}selected{% endif %}>科技与企业</option>
                <option value="大宗商品与能源" {% if category == '大宗商品与能源' %}selected{% endif %}>大宗商品与能源</option>
            </select>
            <select name="days" hx-get="/api/events/timeline" hx-target="#events-timeline-content" hx-include="#event-category-filter">
                <option value="1" {% if days == 1 %}selected{% endif %}>今天</option>
                <option value="3" {% if days == 3 %}selected{% endif %}>近3天</option>
                <option value="7" {% if days == 7 %}selected{% endif %}>近7天</option>
                <option value="30" {% if days == 30 %}selected{% endif %}>近30天</option>
            </select>
        </div>
    </div>

    <div id="events-timeline-content">
        {% if events %}
        <div class="timeline-list">
            {% for event in events %}
            <div class="timeline-item" data-event-id="{{ event.event_id }}">
                <div class="timeline-marker"></div>
                <div class="timeline-content">
                    <div class="event-header">
                        <span class="event-category badge">{{ event.category }}</span>
                        <span class="event-date">{{ event.last_updated }}</span>
                    </div>
                    <h4 class="event-title">
                        <a href="/events/{{ event.event_id }}" hx-get="/api/events/{{ event.event_id }}" hx-target="#main-content" hx-push-url="true">
                            {{ event.title }}
                        </a>
                    </h4>
                    <div class="event-meta">
                        <span class="event-updates">
                            <i class="icon-update"></i> {{ event.update_count }} 次更新
                        </span>
                        <span class="event-articles">
                            <i class="icon-article"></i> {{ event.article_count }} 篇文章
                        </span>
                        <span class="event-status status-{{ event.status }}">
                            {{ event.status }}
                        </span>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="empty-state">
            <p>暂无事件数据</p>
        </div>
        {% endif %}
    </div>
</div>

<style>
.events-timeline {
    padding: 1rem 0;
}

.timeline-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
}

.timeline-header h3 {
    margin: 0;
    font-size: 1.25rem;
    font-weight: 600;
}

.timeline-filters {
    display: flex;
    gap: 0.5rem;
}

.timeline-filters select {
    padding: 0.5rem 1rem;
    border: 1px solid #e2e8f0;
    border-radius: 0.375rem;
    background: white;
    font-size: 0.875rem;
    cursor: pointer;
}

.timeline-list {
    position: relative;
    padding-left: 2rem;
}

.timeline-list::before {
    content: '';
    position: absolute;
    left: 0.75rem;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #e2e8f0;
}

.timeline-item {
    position: relative;
    margin-bottom: 1.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid #f1f5f9;
}

.timeline-item:last-child {
    border-bottom: none;
    margin-bottom: 0;
}

.timeline-marker {
    position: absolute;
    left: -1.5rem;
    top: 0.5rem;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #3b82f6;
    border: 2px solid white;
    box-shadow: 0 0 0 2px #3b82f6;
}

.timeline-content {
    padding: 0.5rem 0;
}

.event-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
}

.event-category {
    padding: 0.25rem 0.5rem;
    border-radius: 0.25rem;
    font-size: 0.75rem;
    font-weight: 500;
    background: #dbeafe;
    color: #1e40af;
}

.event-date {
    font-size: 0.75rem;
    color: #64748b;
}

.event-title {
    margin: 0 0 0.5rem 0;
    font-size: 1rem;
    font-weight: 500;
    line-height: 1.5;
}

.event-title a {
    color: #1e293b;
    text-decoration: none;
}

.event-title a:hover {
    color: #3b82f6;
}

.event-meta {
    display: flex;
    gap: 1rem;
    font-size: 0.75rem;
    color: #64748b;
}

.event-meta i {
    margin-right: 0.25rem;
}

.event-status {
    padding: 0.125rem 0.375rem;
    border-radius: 0.25rem;
    font-size: 0.625rem;
    font-weight: 500;
    text-transform: uppercase;
}

.status-active {
    background: #dcfce7;
    color: #166534;
}

.status-resolved {
    background: #f1f5f9;
    color: #475569;
}

.empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: #64748b;
}
</style>
