<div class="entity-nav">
    <h4 class="entity-nav-title">{{ t("home.focus_entities") }}</h4>
    <div class="entity-type-btns">
        <button class="entity-type-btn active"
                hx-get="/api/entities/popular?limit=15&lang={{ lang }}"
                hx-target="#entity-list"
                hx-swap="innerHTML">{{ t("category.all") }}</button>
        <button class="entity-type-btn"
                hx-get="/api/entities/popular?entity_type=company&limit=15&lang={{ lang }}"
                hx-target="#entity-list"
                hx-swap="innerHTML">Company</button>
        <button class="entity-type-btn"
                hx-get="/api/entities/popular?entity_type=indicator&limit=15&lang={{ lang }}"
                hx-target="#entity-list"
                hx-swap="innerHTML">Indicator</button>
        <button class="entity-type-btn"
                hx-get="/api/entities/popular?entity_type=organization&limit=15&lang={{ lang }}"
                hx-target="#entity-list"
                hx-swap="innerHTML">Organization</button>
        <button class="entity-type-btn"
                hx-get="/api/entities/popular?entity_type=country&limit=15&lang={{ lang }}"
                hx-target="#entity-list"
                hx-swap="innerHTML">Country</button>
    </div>
    <div id="entity-list"
         hx-get="/api/entities/popular?limit=15&lang={{ lang }}"
         hx-trigger="load"
         hx-target="#entity-list"
         hx-swap="innerHTML">
        <span class="loading">{{ t("common.loading") }}</span>
    </div>
</div>
