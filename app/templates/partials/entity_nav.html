<div class="entity-nav">

         hx-trigger="load"
         hx-target="#entity-type-tabs"
         hx-swap="innerHTML">
        <div id="entity-type-tabs">
            <span class="loading">加载类型...</span>
        </div>

    <div id="entity-list"

    </div>
</div>
