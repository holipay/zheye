<a href="/{{ lang }}/news?category=all" class="cat-link {% if not category or category == 'all' %}active{% endif %}">{{ t("category.all") }}</a>
{% for cat_name, count in categories %}
<a href="/{{ lang }}/news?category={{ cat_name }}" class="cat-link {% if category == cat_name %}active{% endif %}">{{ cat_name }}</a>
{% endfor %}
