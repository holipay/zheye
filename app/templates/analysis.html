{% extends "base.html" %}

{% block title %}分析报告 - 者也{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">分析报告</h1>
        <div class="flex items-center space-x-4">
            <input type="date" id="report-date" 
                   class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                   value="{{ report_date or '' }}">
            <button onclick="loadReport()" 
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition-colors">
                加载报告
            </button>
        </div>
    </div>

    <!-- 报告类型选项卡 -->
    <div class="mb-8 border-b border-gray-200">
        <nav class="flex space-x-8">
            <button onclick="switchTab('weekly')" id="tab-weekly" 
                    class="py-4 px-1 border-b-2 font-medium text-sm transition-colors border-blue-500 text-blue-600">
                📊 周报
            </button>
            <button onclick="switchTab('monthly')" id="tab-monthly" 
                    class="py-4 px-1 border-b-2 font-medium text-sm transition-colors border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300">
                📈 月报
            </button>
            <button onclick="switchTab('daily')" id="tab-daily" 
                    class="py-4 px-1 border-b-2 font-medium text-sm transition-colors border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300">
                📰 每日快报
            </button>
        </nav>
    </div>

    <!-- AI 分析状态 -->
    <div id="analysis-status" class="mb-8 bg-white rounded-lg shadow-md p-6">
        <h2 class="text-xl font-semibold mb-4 text-gray-800">分析状态</h2>
        <div class="grid grid-cols-4 gap-4">
            <div class="text-center">
                <div class="text-3xl font-bold text-blue-600" id="status-ai-enabled">-</div>
                <div class="text-sm text-gray-500">AI 功能</div>
            </div>
            <div class="text-center">
                <div class="text-3xl font-bold text-green-600" id="status-analyzed">-</div>
                <div class="text-sm text-gray-500">已分析文章</div>
            </div>
            <div class="text-center">
                <div class="text-3xl font-bold text-gray-600" id="status-total">-</div>
                <div class="text-sm text-gray-500">总文章数</div>
            </div>
            <div class="text-center">
                <div class="text-3xl font-bold text-purple-600" id="status-coverage">-</div>
                <div class="text-sm text-gray-500">覆盖率</div>
            </div>
        </div>
    </div>

    <!-- 报告列表 -->
    <div class="mb-8 bg-white rounded-lg shadow-md p-6">
        <h2 class="text-xl font-semibold mb-4 text-gray-800">
            <span class="mr-2">📋</span>历史报告
        </h2>
        <div id="reports-list" class="space-y-3">
            <p class="text-gray-500">加载中...</p>
        </div>
    </div>

    <!-- 报告内容 -->
    <div id="report-content" class="hidden">
        <!-- 报告头部 -->
        <div class="mb-8 bg-white rounded-lg shadow-md p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold text-gray-800" id="report-title">周报</h2>
                <span class="text-sm text-gray-500" id="report-period">-</span>
            </div>
            <div class="flex items-center justify-between">
                <div class="text-2xl font-bold" id="market-sentiment">-</div>
                <div class="text-sm text-gray-500">
                    分析了 <span id="news-count" class="font-semibold">0</span> 篇文章
                </div>
            </div>
        </div>

        <!-- 总体概述 -->
        <div class="mb-8 bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">
                <span class="mr-2">📝</span>概述
            </h2>
            <p id="overview" class="text-gray-700 leading-relaxed">加载中...</p>
        </div>

        <!-- 热门话题 -->
        <div class="mb-8 bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">
                <span class="mr-2">🔥</span>热门话题
            </h2>
            <div id="hot-topics" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- 动态填充 -->
            </div>
        </div>

        <!-- 关键事件 -->
        <div class="mb-8 bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">
                <span class="mr-2">⚡</span>关键事件
            </h2>
            <div id="key-events" class="space-y-4">
                <!-- 动态填充 -->
            </div>
        </div>

        <!-- 趋势分析 -->
        <div class="mb-8 bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">
                <span class="mr-2">📈</span>趋势分析
            </h2>
            <p id="trend-analysis" class="text-gray-700 leading-relaxed">加载中...</p>
        </div>

        <!-- 分类统计 -->
        <div class="mb-8 bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">
                <span class="mr-2">📊</span>分类统计
            </h2>
            <div id="category-stats" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>

    <!-- 无报告提示 -->
    <div id="no-report" class="hidden bg-yellow-50 border border-yellow-200 rounded-lg p-6 text-center">
        <div class="text-yellow-600 text-4xl mb-4">📭</div>
        <h3 class="text-lg font-semibold text-yellow-800 mb-2">暂无分析报告</h3>
        <p class="text-yellow-700">该时段的分析报告尚未生成，请稍后再试或选择其他日期。</p>
        <p class="text-yellow-600 text-sm mt-2">周报每周一生成，月报每月1日生成</p>
    </div>
</div>

<script>
let currentTab = 'weekly';

// 页面加载时获取状态
document.addEventListener('DOMContentLoaded', function() {
    loadStatus();
    
    // 设置默认日期为今天
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('report-date').value = today;
    
    // 加载报告列表
    loadReportsList();
    
    // 尝试加载当前周的报告
    loadCurrentPeriodReport();
});

function switchTab(tab) {
    currentTab = tab;
    
    // 更新选项卡样式
    document.querySelectorAll('[id^="tab-"]').forEach(el => {
        el.classList.remove('border-blue-500', 'text-blue-600');
        el.classList.add('border-transparent', 'text-gray-500');
    });
    document.getElementById(`tab-${tab}`).classList.add('border-blue-500', 'text-blue-600');
    document.getElementById(`tab-${tab}`).classList.remove('border-transparent', 'text-gray-500');
    
    // 重新加载报告列表
    loadReportsList();
    
    // 尝试加载当前周期的报告
    loadCurrentPeriodReport();
}

function loadCurrentPeriodReport() {
    const today = new Date();
    let targetDate;
    
    if (currentTab === 'weekly') {
        // 获取本周一
        const weekday = today.getDay();
        const monday = new Date(today);
        monday.setDate(today.getDate() - weekday + (weekday === 0 ? -6 : 1));
        targetDate = monday.toISOString().split('T')[0];
    } else if (currentTab === 'monthly') {
        // 获取本月1号
        targetDate = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-01`;
    } else {
        targetDate = today.toISOString().split('T')[0];
    }
    
    document.getElementById('report-date').value = targetDate;
    loadReport();
}

async function loadStatus() {
    try {
        const response = await fetch('/api/analysis/status');
        const data = await response.json();
        
        document.getElementById('status-ai-enabled').textContent = data.ai_enabled ? '✅ 启用' : '❌ 禁用';
        document.getElementById('status-analyzed').textContent = data.articles_analyzed;
        document.getElementById('status-total').textContent = data.articles_total;
        document.getElementById('status-coverage').textContent = data.analysis_coverage + '%';
    } catch (error) {
        console.error('获取状态失败:', error);
    }
}

async function loadReportsList() {
    try {
        const response = await fetch(`/api/analysis/reports?period=${currentTab}&limit=10`);
        const data = await response.json();
        
        const container = document.getElementById('reports-list');
        if (data.reports && data.reports.length > 0) {
            container.innerHTML = data.reports.map(report => `
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg hover:bg-gray-100 cursor-pointer transition-colors"
                     onclick="loadReportByDate('${report.period_start}')">
                    <div>
                        <div class="font-medium text-gray-800">${report.period_start} ~ ${report.period_end}</div>
                        <div class="text-sm text-gray-500 mt-1">${report.overview ? report.overview.substring(0, 100) + '...' : '暂无概述'}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-sm font-semibold ${
                            report.market_sentiment === 'bullish' ? 'text-green-600' :
                            report.market_sentiment === 'bearish' ? 'text-red-600' :
                            'text-gray-600'
                        }">${report.market_sentiment || '-'}</div>
                        <div class="text-xs text-gray-400">${report.news_count || 0} 篇</div>
                    </div>
                </div>
            `).join('');
        } else {
            container.innerHTML = '<p class="text-gray-500">暂无历史报告</p>';
        }
    } catch (error) {
        console.error('获取报告列表失败:', error);
    }
}

function loadReportByDate(date) {
    document.getElementById('report-date').value = date;
    loadReport();
}

async function loadReport() {
    const dateInput = document.getElementById('report-date').value;
    
    try {
        let reportData = null;
        
        if (currentTab === 'weekly') {
            const response = await fetch(`/api/analysis/weekly/${dateInput}`);
            if (response.ok) {
                reportData = await response.json();
            }
        } else if (currentTab === 'monthly') {
            const response = await fetch(`/api/analysis/monthly/${dateInput}`);
            if (response.ok) {
                reportData = await response.json();
            }
        } else {
            const response = await fetch(`/api/analysis/daily/${dateInput}`);
            if (response.ok) {
                reportData = await response.json();
            }
        }
        
        if (reportData) {
            displayReport(reportData);
        } else {
            showNoReport();
        }
    } catch (error) {
        console.error('加载报告失败:', error);
        showNoReport();
    }
}

function displayReport(report) {
    document.getElementById('report-content').classList.remove('hidden');
    document.getElementById('no-report').classList.add('hidden');
    
    // 更新标题
    const titleMap = {
        'weekly': '周报',
        'monthly': '月报',
        'daily': '每日快报'
    };
    document.getElementById('report-title').textContent = titleMap[currentTab] || '分析报告';
    document.getElementById('report-period').textContent = 
        report.period_start && report.period_end ? `${report.period_start} ~ ${report.period_end}` : 
        report.date || '-';
    
    document.getElementById('market-sentiment').textContent = report.market_sentiment || '-';
    document.getElementById('news-count').textContent = report.news_count || 0;
    document.getElementById('overview').textContent = report.overview || '暂无概述';
    document.getElementById('trend-analysis').textContent = report.trend_analysis || '暂无趋势分析';
    
    // 热门话题
    const hotTopicsContainer = document.getElementById('hot-topics');
    if (report.hot_topics && report.hot_topics.length > 0) {
        hotTopicsContainer.innerHTML = report.hot_topics.map(topic => `
            <div class="border border-gray-200 rounded-lg p-4 hover:shadow-md transition-shadow">
                <div class="flex justify-between items-start mb-2">
                    <h4 class="font-semibold text-gray-800">${topic.topic || topic}</h4>
                    <span class="text-sm px-2 py-1 rounded ${
                        topic.impact === 'high' ? 'bg-red-100 text-red-800' :
                        topic.impact === 'medium' ? 'bg-yellow-100 text-yellow-800' :
                        'bg-gray-100 text-gray-800'
                    }">${topic.impact || '中'}</span>
                </div>
                <p class="text-sm text-gray-600">${topic.description || ''}</p>
            </div>
        `).join('');
    } else {
        hotTopicsContainer.innerHTML = '<p class="text-gray-500">暂无热门话题</p>';
    }
    
    // 关键事件
    const keyEventsContainer = document.getElementById('key-events');
    if (report.key_events && report.key_events.length > 0) {
        keyEventsContainer.innerHTML = report.key_events.map(event => `
            <div class="flex items-start space-x-3 p-3 bg-gray-50 rounded-lg">
                <span class="text-lg">⚡</span>
                <div>
                    <div class="font-medium text-gray-800">${event.event || event}</div>
                    <div class="text-sm text-gray-500">${event.category || ''} · ${event.significance || ''}</div>
                </div>
            </div>
        `).join('');
    } else {
        keyEventsContainer.innerHTML = '<p class="text-gray-500">暂无关键事件</p>';
    }
    
    // 分类统计
    const categoryStatsContainer = document.getElementById('category-stats');
    if (report.category_stats && report.category_stats.length > 0) {
        categoryStatsContainer.innerHTML = report.category_stats.map(stat => `
            <div class="text-center p-4 bg-gray-50 rounded-lg">
                <div class="text-2xl font-bold text-blue-600">${stat.count}</div>
                <div class="text-sm text-gray-600 mt-1">${stat.category}</div>
                <div class="text-xs text-gray-400 mt-1">
                    情感: ${stat.avg_sentiment > 0 ? '+' : ''}${stat.avg_sentiment}
                </div>
            </div>
        `).join('');
    } else {
        categoryStatsContainer.innerHTML = '<p class="text-gray-500">暂无分类统计</p>';
    }
}

function showNoReport() {
    document.getElementById('report-content').classList.add('hidden');
    document.getElementById('no-report').classList.remove('hidden');
}
</script>
{% endblock %}
