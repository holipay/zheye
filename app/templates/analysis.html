{% extends "base.html" %}

{% block title %}每日分析报告 - 者也{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">每日分析报告</h1>
        <div class="flex items-center space-x-4">
            <input type="date" id="report-date" 
                   class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                   value="{{ report_date or '' }}">
            <button onclick="loadReport()" 
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition-colors">
                加载报告
            </button>
        </div>
    </div>

    <!-- AI 分析状态 -->
    <div id="analysis-status" class="mb-8 bg-white rounded-lg shadow-md p-6">
        <h2 class="text-xl font-semibold mb-4 text-gray-800">分析状态</h2>
        <div class="grid grid-cols-4 gap-4">
            <div class="text-center">
                <div class="text-3xl font-bold text-blue-600" id="status-ai-enabled">-</div>
                <div class="text-sm text-gray-500">AI 功能</div>
            </div>
            <div class="text-center">
                <div class="text-3xl font-bold text-green-600" id="status-analyzed">-</div>
                <div class="text-sm text-gray-500">已分析文章</div>
            </div>
            <div class="text-center">
                <div class="text-3xl font-bold text-gray-600" id="status-total">-</div>
                <div class="text-sm text-gray-500">总文章数</div>
            </div>
            <div class="text-center">
                <div class="text-3xl font-bold text-purple-600" id="status-coverage">-</div>
                <div class="text-sm text-gray-500">覆盖率</div>
            </div>
        </div>
    </div>

    <!-- 每日报告内容 -->
    <div id="report-content" class="hidden">
        <!-- 市场情绪 -->
        <div class="mb-8 bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">
                <span class="mr-2">📊</span>市场情绪
            </h2>
            <div class="flex items-center justify-between">
                <div class="text-2xl font-bold" id="market-sentiment">-</div>
                <div class="text-sm text-gray-500">
                    分析了 <span id="news-count" class="font-semibold">0</span> 篇文章
                </div>
            </div>
        </div>

        <!-- 总体概述 -->
        <div class="mb-8 bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">
                <span class="mr-2">📝</span>今日概述
            </h2>
            <p id="overview" class="text-gray-700 leading-relaxed">加载中...</p>
        </div>

        <!-- 热门话题 -->
        <div class="mb-8 bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">
                <span class="mr-2">🔥</span>热门话题
            </h2>
            <div id="hot-topics" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- 动态填充 -->
            </div>
        </div>

        <!-- 关键事件 -->
        <div class="mb-8 bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">
                <span class="mr-2">⚡</span>关键事件
            </h2>
            <div id="key-events" class="space-y-4">
                <!-- 动态填充 -->
            </div>
        </div>

        <!-- 趋势分析 -->
        <div class="mb-8 bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">
                <span class="mr-2">📈</span>趋势分析
            </h2>
            <p id="trend-analysis" class="text-gray-700 leading-relaxed">加载中...</p>
        </div>
    </div>

    <!-- 无报告提示 -->
    <div id="no-report" class="hidden bg-yellow-50 border border-yellow-200 rounded-lg p-6 text-center">
        <div class="text-yellow-600 text-4xl mb-4">📭</div>
        <h3 class="text-lg font-semibold text-yellow-800 mb-2">暂无分析报告</h3>
        <p class="text-yellow-700">该日期的分析报告尚未生成，请稍后再试或选择其他日期。</p>
    </div>

    <!-- 情感分析统计 -->
    <div class="mb-8 bg-white rounded-lg shadow-md p-6">
        <h2 class="text-xl font-semibold mb-4 text-gray-800">
            <span class="mr-2">😊</span>情感分析统计
        </h2>
        <div id="sentiment-stats" class="grid grid-cols-3 gap-4 mb-6">
            <!-- 动态填充 -->
        </div>
        <h3 class="text-lg font-semibold mb-3 text-gray-700">重要文章</h3>
        <div id="important-articles" class="space-y-3">
            <!-- 动态填充 -->
        </div>
    </div>
</div>

<script>
// 页面加载时获取状态
document.addEventListener('DOMContentLoaded', function() {
    loadStatus();
    
    // 设置默认日期为今天
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('report-date').value = today;
    loadReport();
});

async function loadStatus() {
    try {
        const response = await fetch('/api/analysis/status');
        const data = await response.json();
        
        document.getElementById('status-ai-enabled').textContent = data.ai_enabled ? '✅ 启用' : '❌ 禁用';
        document.getElementById('status-analyzed').textContent = data.articles_analyzed;
        document.getElementById('status-total').textContent = data.articles_total;
        document.getElementById('status-coverage').textContent = data.analysis_coverage + '%';
    } catch (error) {
        console.error('获取状态失败:', error);
    }
}

async function loadReport() {
    const dateInput = document.getElementById('report-date').value;
    
    try {
        // 加载每日报告
        const reportResponse = await fetch(`/api/analysis/daily/${dateInput}`);
        
        if (reportResponse.ok) {
            const report = await reportResponse.json();
            displayReport(report);
        } else {
            showNoReport();
        }
        
        // 加载情感统计
        const sentimentResponse = await fetch(`/api/analysis/sentiment?target_date=${dateInput}`);
        if (sentimentResponse.ok) {
            const sentiment = await sentimentResponse.json();
            displaySentimentStats(sentiment);
        }
    } catch (error) {
        console.error('加载报告失败:', error);
        showNoReport();
    }
}

function displayReport(report) {
    document.getElementById('report-content').classList.remove('hidden');
    document.getElementById('no-report').classList.add('hidden');
    
    document.getElementById('market-sentiment').textContent = report.market_sentiment || '-';
    document.getElementById('news-count').textContent = report.news_count || 0;
    document.getElementById('overview').textContent = report.overview || '暂无概述';
    document.getElementById('trend-analysis').textContent = report.trend_analysis || '暂无趋势分析';
    
    // 热门话题
    const hotTopicsContainer = document.getElementById('hot-topics');
    if (report.hot_topics && report.hot_topics.length > 0) {
        hotTopicsContainer.innerHTML = report.hot_topics.map(topic => `
            <div class="border border-gray-200 rounded-lg p-4 hover:shadow-md transition-shadow">
                <div class="flex justify-between items-start mb-2">
                    <h4 class="font-semibold text-gray-800">${topic.topic}</h4>
                    <span class="text-sm px-2 py-1 rounded ${
                        topic.sentiment === 'positive' ? 'bg-green-100 text-green-800' :
                        topic.sentiment === 'negative' ? 'bg-red-100 text-red-800' :
                        'bg-gray-100 text-gray-800'
                    }">${topic.sentiment || '中性'}</span>
                </div>
                <div class="text-sm text-gray-500 mb-2">提及 ${topic.count || 0} 次</div>
                <p class="text-sm text-gray-600">${topic.description || ''}</p>
            </div>
        `).join('');
    } else {
        hotTopicsContainer.innerHTML = '<p class="text-gray-500">暂无热门话题</p>';
    }
    
    // 关键事件
    const keyEventsContainer = document.getElementById('key-events');
    if (report.key_events && report.key_events.length > 0) {
        keyEventsContainer.innerHTML = report.key_events.map(event => `
            <div class="flex items-start space-x-3 p-3 bg-gray-50 rounded-lg">
                <span class="text-lg">${
                    event.impact === 'high' ? '🔴' :
                    event.impact === 'medium' ? '🟡' : '🟢'
                }</span>
                <div>
                    <div class="font-medium text-gray-800">${event.event}</div>
                    <div class="text-sm text-gray-500">${event.category || ''} · 影响: ${event.impact || '中'}</div>
                </div>
            </div>
        `).join('');
    } else {
        keyEventsContainer.innerHTML = '<p class="text-gray-500">暂无关键事件</p>';
    }
}

function showNoReport() {
    document.getElementById('report-content').classList.add('hidden');
    document.getElementById('no-report').classList.remove('hidden');
}

function displaySentimentStats(data) {
    // 情感分布
    const sentimentContainer = document.getElementById('sentiment-stats');
    if (data.sentiment_distribution && data.sentiment_distribution.length > 0) {
        sentimentContainer.innerHTML = data.sentiment_distribution.map(item => `
            <div class="text-center p-4 ${
                item.sentiment === 'positive' ? 'bg-green-50' :
                item.sentiment === 'negative' ? 'bg-red-50' :
                'bg-gray-50'
            } rounded-lg">
                <div class="text-2xl font-bold ${
                    item.sentiment === 'positive' ? 'text-green-600' :
                    item.sentiment === 'negative' ? 'text-red-600' :
                    'text-gray-600'
                }">${item.count}</div>
                <div class="text-sm text-gray-500">${
                    item.sentiment === 'positive' ? '😊 积极' :
                    item.sentiment === 'negative' ? '😟 消极' :
                    '😐 中性'
                }</div>
                <div class="text-xs text-gray-400 mt-1">
                    平均分: ${item.avg_score}
                </div>
            </div>
        `).join('');
    }
    
    // 重要文章
    const articlesContainer = document.getElementById('important-articles');
    if (data.important_articles && data.important_articles.length > 0) {
        articlesContainer.innerHTML = data.important_articles.map(article => `
            <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors">
                <div class="flex-1">
                    <a href="/news/${article.id}" class="text-blue-600 hover:text-blue-800 font-medium">
                        ${article.translated_title || article.title}
                    </a>
                    <div class="text-sm text-gray-500 mt-1">
                        ${article.category} · 重要性: ${article.importance}
                    </div>
                </div>
                <span class="ml-4 px-2 py-1 text-sm rounded ${
                    article.sentiment === 'positive' ? 'bg-green-100 text-green-800' :
                    article.sentiment === 'negative' ? 'bg-red-100 text-red-800' :
                    'bg-gray-100 text-gray-800'
                }">${article.sentiment || '中性'}</span>
            </div>
        `).join('');
    } else {
        articlesContainer.innerHTML = '<p class="text-gray-500">暂无重要文章</p>';
    }
}
</script>
{% endblock %}
