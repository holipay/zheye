{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-lg);">
    <h1 style="font-family: var(--font-serif); font-size: 28px; font-weight: 700;">分析报告</h1>
    <div style="display: flex; align-items: center; gap: var(--spacing-md);">
        <input type="date" id="report-date" 
               style="padding: 8px 12px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-size: 13px;"
               value="{{ report_date or '' }}">
        <button onclick="loadReport()" class="btn btn-accent">加载报告</button>
    </div>
</div>

<!-- 报告类型选项卡 -->
<div class="report-tabs">
    <button onclick="switchTab('weekly')" id="tab-weekly" class="report-tab active">
        周报
    </button>
    <button onclick="switchTab('monthly')" id="tab-monthly" class="report-tab">
        月报
    </button>
    <button onclick="switchTab('daily')" id="tab-daily" class="report-tab">
        每日快报
    </button>
</div>

<!-- 分析状态 -->
<div class="card" style="margin-bottom: var(--spacing-lg);">
    <div class="card-header">
        <h2 class="card-title">分析状态</h2>
    </div>
    <div class="card-body">
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--spacing-lg); text-align: center;">
            <div>
                <div style="font-size: 24px; font-weight: 700; color: var(--color-up);" id="status-ai-enabled">-</div>
                <div style="font-size: 12px; color: var(--text-muted);">AI 功能</div>
            </div>
            <div>
                <div style="font-size: 24px; font-weight: 700; color: var(--color-primary);" id="status-analyzed">-</div>
                <div style="font-size: 12px; color: var(--text-muted);">已分析</div>
            </div>
            <div>
                <div style="font-size: 24px; font-weight: 700;" id="status-total">-</div>
                <div style="font-size: 12px; color: var(--text-muted);">总文章数</div>
            </div>
            <div>
                <div style="font-size: 24px; font-weight: 700; color: var(--color-accent);" id="status-coverage">-</div>
                <div style="font-size: 12px; color: var(--text-muted);">覆盖率</div>
            </div>
        </div>
    </div>
</div>

<div class="report-content">
    <div class="report-main">
        <!-- 历史报告列表 -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">历史报告</h2>
            </div>
            <div id="reports-list" class="news-list">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 报告内容 -->
        <div id="report-content" class="hidden">
            <!-- 概述 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">概述</h2>
                    <span id="report-period" style="font-size: 13px; color: var(--text-muted);">-</span>
                </div>
                <div class="card-body">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-md);">
                        <div style="font-size: 20px; font-weight: 700;" id="market-sentiment">-</div>
                        <div style="font-size: 13px; color: var(--text-muted);">
                            分析了 <span id="news-count" style="font-weight: 600;">0</span> 篇文章
                        </div>
                    </div>
                    <div class="report-overview" id="overview">加载中...</div>
                </div>
            </div>

            <!-- 热门话题 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">热门话题</h2>
                </div>
                <div class="card-body">
                    <div id="hot-topics" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--spacing-md);">
                        <!-- 动态填充 -->
                    </div>
                </div>
            </div>

            <!-- 关键事件 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">关键事件</h2>
                </div>
                <div id="key-events" class="news-list">
                    <!-- 动态填充 -->
                </div>
            </div>

            <!-- 趋势分析 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">趋势分析</h2>
                </div>
                <div class="card-body">
                    <div class="report-overview" id="trend-analysis">加载中...</div>
                </div>
            </div>
        </div>

        <!-- 无报告提示 -->
        <div id="no-report" class="hidden card">
            <div class="card-body" style="text-align: center; padding: 60px;">
                <div style="font-size: 48px; margin-bottom: var(--spacing-md);">📭</div>
                <h3 style="font-size: 18px; margin-bottom: var(--spacing-sm);">暂无分析报告</h3>
                <p style="color: var(--text-muted);">该时段的分析报告尚未生成</p>
                <p style="color: var(--text-muted); font-size: 13px; margin-top: var(--spacing-sm);">周报每周一生成，月报每月1日生成</p>
            </div>
        </div>
    </div>

    <!-- 侧边栏 -->
    <aside class="sidebar">
        <!-- 分类统计 -->
        <div class="sidebar-widget">
            <div class="widget-header">分类统计</div>
            <div class="widget-content">
                <div id="category-stats" class="entity-list">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>

        <!-- 情感分布 -->
        <div class="sidebar-widget">
            <div class="widget-header">情感分布</div>
            <div class="widget-content">
                <div id="sentiment-stats">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </aside>
</div>

<script>
let currentTab = 'weekly';

document.addEventListener('DOMContentLoaded', function() {
    loadStatus();
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('report-date').value = today;
    loadReportsList();
    loadCurrentPeriodReport();
});

function switchTab(tab) {
    currentTab = tab;
    
    document.querySelectorAll('.report-tab').forEach(el => {
        el.classList.remove('active');
    });
    document.getElementById(`tab-${tab}`).classList.add('active');
    
    loadReportsList();
    loadCurrentPeriodReport();
}

function loadCurrentPeriodReport() {
    const today = new Date();
    let targetDate;
    
    if (currentTab === 'weekly') {
        const weekday = today.getDay();
        const monday = new Date(today);
        monday.setDate(today.getDate() - weekday + (weekday === 0 ? -6 : 1));
        targetDate = monday.toISOString().split('T')[0];
    } else if (currentTab === 'monthly') {
        targetDate = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-01`;
    } else {
        targetDate = today.toISOString().split('T')[0];
    }
    
    document.getElementById('report-date').value = targetDate;
    loadReport();
}

async function loadStatus() {
    try {
        const response = await fetch('/api/analysis/status');
        const data = await response.json();
        
        document.getElementById('status-ai-enabled').textContent = data.ai_enabled ? '✓ 启用' : '✗ 禁用';
        document.getElementById('status-analyzed').textContent = data.articles_analyzed;
        document.getElementById('status-total').textContent = data.articles_total;
        document.getElementById('status-coverage').textContent = data.analysis_coverage + '%';
    } catch (error) {
        console.error('获取状态失败:', error);
    }
}

async function loadReportsList() {
    try {
        const response = await fetch(`/api/analysis/reports?period=${currentTab}&limit=10`);
        const data = await response.json();
        
        const container = document.getElementById('reports-list');
        if (data.reports && data.reports.length > 0) {
            container.innerHTML = data.reports.map(report => `
                <div class="news-item" onclick="loadReportByDate('${report.period_start}')">
                    <div class="news-item-header">
                        <span class="news-source">${report.period_start} ~ ${report.period_end}</span>
                        <span class="news-time">${report.news_count || 0} 篇</span>
                    </div>
                    <div class="news-title">
                        <a href="#">${report.overview ? report.overview.substring(0, 80) + '...' : '暂无概述'}</a>
                    </div>
                    <div class="news-meta">
                        <span class="badge ${
                            report.market_sentiment === 'bullish' ? 'badge-positive' :
                            report.market_sentiment === 'bearish' ? 'badge-negative' :
                            'badge-neutral'
                        }">${report.market_sentiment || '-'}</span>
                    </div>
                </div>
            `).join('');
        } else {
            container.innerHTML = '<div class="empty-state">暂无历史报告</div>';
        }
    } catch (error) {
        console.error('获取报告列表失败:', error);
    }
}

function loadReportByDate(date) {
    document.getElementById('report-date').value = date;
    loadReport();
}

async function loadReport() {
    const dateInput = document.getElementById('report-date').value;
    
    try {
        let reportData = null;
        
        if (currentTab === 'weekly') {
            const response = await fetch(`/api/analysis/weekly/${dateInput}`);
            if (response.ok) reportData = await response.json();
        } else if (currentTab === 'monthly') {
            const response = await fetch(`/api/analysis/monthly/${dateInput}`);
            if (response.ok) reportData = await response.json();
        } else {
            const response = await fetch(`/api/analysis/daily/${dateInput}`);
            if (response.ok) reportData = await response.json();
        }
        
        if (reportData) {
            displayReport(reportData);
        } else {
            showNoReport();
        }
    } catch (error) {
        console.error('加载报告失败:', error);
        showNoReport();
    }
}

function displayReport(report) {
    document.getElementById('report-content').classList.remove('hidden');
    document.getElementById('no-report').classList.add('hidden');
    
    document.getElementById('report-period').textContent = 
        report.period_start && report.period_end ? `${report.period_start} ~ ${report.period_end}` : report.date || '-';
    
    const sentimentMap = {
        'bullish': '📈 看涨',
        'bearish': '📉 看跌',
        'neutral': '➡️ 中性',
        'mixed': '🔀 混合'
    };
    document.getElementById('market-sentiment').textContent = sentimentMap[report.market_sentiment] || report.market_sentiment || '-';
    document.getElementById('news-count').textContent = report.news_count || 0;
    document.getElementById('overview').textContent = report.overview || '暂无概述';
    document.getElementById('trend-analysis').textContent = report.trend_analysis || '暂无趋势分析';
    
    // 热门话题
    const hotTopicsContainer = document.getElementById('hot-topics');
    if (report.hot_topics && report.hot_topics.length > 0) {
        hotTopicsContainer.innerHTML = report.hot_topics.map(topic => `
            <div class="event-card">
                <div class="event-card-title">${topic.topic || topic}</div>
                <div class="event-card-meta">${topic.description || ''}</div>
            </div>
        `).join('');
    } else {
        hotTopicsContainer.innerHTML = '<div style="color: var(--text-muted);">暂无热门话题</div>';
    }
    
    // 关键事件
    const keyEventsContainer = document.getElementById('key-events');
    if (report.key_events && report.key_events.length > 0) {
        keyEventsContainer.innerHTML = report.key_events.map(event => `
            <div class="news-item">
                <div class="news-title"><a href="#">${event.event || event}</a></div>
                <div class="news-meta">
                    <span>${event.category || ''}</span>
                    <span>${event.significance || ''}</span>
                </div>
            </div>
        `).join('');
    } else {
        keyEventsContainer.innerHTML = '<div class="empty-state">暂无关键事件</div>';
    }
}

function showNoReport() {
    document.getElementById('report-content').classList.add('hidden');
    document.getElementById('no-report').classList.remove('hidden');
}
</script>
{% endblock %}
