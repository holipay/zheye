settings:
  fetch_timeout: 20
  max_retries: 2
  dedup_threshold: 0.75
  retention_days: 30
  max_items_per_category: 200

# ============================================================
# API 数据源配置（需要 API Key）
# ============================================================
api_sources:
  # 汇率数据
  - name: ExchangeRate-API
    type: api
    provider: exchangerate
    url: https://v6.exchangerate-api.com/v6
    free_tier:
      requests_per_month: 1500
      update_frequency: daily
    description: 165 种货币汇率，免费计划每天更新
    env_key: EXCHANGE_RATE_API_KEY

  # 股票/商品/外汇
  - name: Alpha Vantage
    type: api
    provider: alphavantage
    url: https://www.alphavantage.co/query
    free_tier:
      requests_per_day: 25
      requests_per_minute: 5
    description: 股票、外汇、商品、加密货币数据
    env_key: ALPHA_VANTAGE_API_KEY
    endpoints:
      - forex
      - commodities
      - stocks
      - crypto

  # 经济日历
  - name: Trading Economics
    type: api
    provider: tradingeconomics
    url: https://api.tradingeconomics.com
    free_tier:
      requests_per_month: 500
    description: 经济日历、宏观数据、央行决策
    env_key: TRADING_ECONOMICS_KEY

